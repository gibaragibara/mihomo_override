name: "po0 防火墙加白"
description: "po0 防火墙加白状态小组件（结构对齐服务器监控）。Token / 坑位在模块参数填写；坑位从 0 起算（0=第1坑，2=第3坑）。"

env_schema:
  tokens:
    name: Token
    description: "pgnfw_ 开头的防火墙 token。多台机器用英文逗号分割。"
    default_value: ""
  slot:
    name: 坑位
    description: "固定坑位索引，从 0 起算：0=第1坑，1=第2坑，2=第3坑。留空则不固定。"
    default_value: ""

rules:
- ip_cidr:
    match: 124.221.69.228/32
    policy: DIRECT
    no_resolve: true

scriptings:
- generic:
    name: po0 防火墙加白
    script_url: https://raw.githubusercontent.com/gibaragibara/mihomo_override/main/egern/po0-firewall-whitelist.js

widgets:
- name: po0 防火墙加白
  script_name: po0 防火墙加白
