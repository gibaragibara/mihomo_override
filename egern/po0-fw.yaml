name: "po0 防火墙自动加白"
description: "自动把本机出口 IP 加入 po0 防火墙白名单。网络变化即时 + 每 10 分钟兜底；加白 API 直连。坑位从 0 起算（0=第1坑，2=第3坑）。支持小组件。"

env_schema:
  tokens:
    name: Token
    description: "pgnfw_ 开头的防火墙 token。多台机器用英文逗号分割。也可写 pgnfw_xxx@2 单独指定坑位。"
    default_value: ""
  slot:
    name: 坑位
    description: "固定坑位索引，从 0 起算：0=第1坑，1=第2坑，2=第3坑。留空则不固定。"
    default_value: ""

rules:
- ip_cidr:
    match: 124.221.69.228/32
    policy: DIRECT
    no_resolve: true

scriptings:
- schedule:
    name: po0-fw-cron
    cron: "*/10 * * * *"
    script_url: https://raw.githubusercontent.com/gibaragibara/mihomo_override/main/egern/po0-firewall-whitelist.js
    timeout: 60
- network:
    name: po0-fw-network
    script_url: https://raw.githubusercontent.com/gibaragibara/mihomo_override/main/egern/po0-firewall-whitelist.js
    timeout: 60
# 小组件 / 手动刷新：名称需与 widgets.script_name 完全一致（对齐服务器监控写法）
- generic:
    name: po0 防火墙加白
    script_url: https://raw.githubusercontent.com/gibaragibara/mihomo_override/main/egern/po0-firewall-whitelist.js
    timeout: 60

widgets:
- name: po0 防火墙加白
  script_name: po0 防火墙加白
