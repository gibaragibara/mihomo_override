name: Update Kelee MITM

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate merged MITM rules
        run: python3 scripts/plugin2amrs.py --batch --merge-only

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No MITM changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MITM/KeleeAds.amrs MITM/KeleeAds.arrs
          git commit -m "Update Kelee merged MITM rules"
          git push