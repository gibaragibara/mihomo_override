name: Update ChinaMax

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate ChinaMax
        run: python3 scripts/update_chinamax.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No ChinaMax changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ChinaMax
          git commit -m "Update ChinaMax rules"
          git push
